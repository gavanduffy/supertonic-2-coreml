<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supertonic TTS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f12;
      color: #e8e8f0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      color: #e8e8f0;
      resize: vertical;
      outline: none;
      font-family: inherit;
    }

    textarea:focus {
      border-color: rgba(100,180,255,0.5);
    }

    textarea::placeholder { color: rgba(255,255,255,0.25); }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    button:active { opacity: 0.7; }

    .btn-primary {
      background: #3478f6;
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #e8e8f0;
    }

    .status {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      padding: 10px 16px 14px;
      min-height: 36px;
    }

    .status.ok { color: #4cd964; }
    .status.err { color: #ff6b6b; }
  </style>
</head>
<body>
  <header>
    <!-- Waveform icon -->
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3478f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12h2M6 6v12M10 4v16M14 8v8M18 6v12M22 12h-2"/>
    </svg>
    <h1>Supertonic TTS</h1>
  </header>

  <div class="section">
    <div class="section-title">Text to speak</div>
    <textarea id="textInput" placeholder="Paste text here, or use the buttons below to grab selected text / full page…"></textarea>
    <div class="btn-row">
      <button class="btn-secondary" id="btnSelection">Use Selection</button>
      <button class="btn-secondary" id="btnPage">Use Page</button>
    </div>
  </div>

  <div class="section">
    <div class="btn-row">
      <button class="btn-primary" id="btnSpeak">Open in Supertonic</button>
      <button class="btn-secondary" id="btnCopy">Copy Link</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
