name: iOS Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      # Resolve package dependencies (if any Swift packages are added later).
      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project supertonic2-coreml-ios-test.xcodeproj \
            -scheme "supertonic2-coreml-ios-test" \
            -resolvePackageDependencies \
            || true

      # Build for the simulator.  CoreML models are large binaries managed
      # via Git LFS; the build step uses the project as-is and skips signing
      # for CI purposes.
      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project supertonic2-coreml-ios-test.xcodeproj \
            -scheme "supertonic2-coreml-ios-test" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            clean build \
            | tee /tmp/xcodebuild.log \
            | xcpretty --color --simple \
            || (cat /tmp/xcodebuild.log && exit 1)

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project supertonic2-coreml-ios-test.xcodeproj \
            -scheme "supertonic2-coreml-ios-testTests" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild-tests.log \
            | xcpretty --color --simple \
            || (cat /tmp/xcodebuild-tests.log && exit 1)

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /tmp/xcodebuild*.log
          retention-days: 7

      # Archive the app targeting a generic iOS device with signing disabled,
      # then manually package the .app into an unsigned IPA.
      - name: Build unsigned IPA
        run: |
          xcodebuild archive \
            -project supertonic2-coreml-ios-test.xcodeproj \
            -scheme "supertonic2-coreml-ios-test" \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/supertonic2.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild-archive.log \
            | xcpretty --color --simple \
            || (cat /tmp/xcodebuild-archive.log && exit 1)

          APP_PATH=$(find /tmp/supertonic2.xcarchive/Products -name "*.app" | head -1)
          mkdir -p /tmp/ipa-payload/Payload
          cp -r "$APP_PATH" /tmp/ipa-payload/Payload/
          cd /tmp/ipa-payload
          zip -r /tmp/supertonic2-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: supertonic2-unsigned-ipa
          path: /tmp/supertonic2-unsigned.ipa
          retention-days: 14
